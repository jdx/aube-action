name: semantic-pr-lint

# Validates that PR titles use a Conventional Commit type so release-please
# can map them to a CHANGELOG section and bump the version correctly
# (feat -> minor, fix -> patch, BREAKING CHANGE / `!` -> major). Repos in
# this org use squash-merge, so the PR title becomes the main-branch
# commit subject; this lint protects the release pipeline from a
# malformed title silently producing wrong bumps.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            refactor
            chore
            docs
            style
            test
            perf
            build
            ci
            revert
            security

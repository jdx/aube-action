name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default:
    name: default / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: setup
        uses: ./
      - shell: bash
        env:
          VERSION: ${{ steps.setup.outputs.version }}
          BIN_PATH: ${{ steps.setup.outputs.bin-path }}
          NODE_VERSION: ${{ steps.setup.outputs.node-version }}
        run: |
          aube --version
          test -n "$VERSION"
          test -n "$BIN_PATH"
          test -z "$NODE_VERSION"

  pinned:
    name: pinned aube / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: ./
        with:
          version: "1.5.1"
      - shell: bash
        run: |
          aube --version
          aube --version | grep -q '1\.5\.1'

  node-explicit:
    name: node explicit / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - id: setup
        uses: ./
        with:
          node-version: "22"
      - shell: bash
        env:
          NODE_VERSION: ${{ steps.setup.outputs.node-version }}
          NODE_BIN_PATH: ${{ steps.setup.outputs.node-bin-path }}
        run: |
          node --version | grep -q '^v22\.'
          test -n "$NODE_VERSION"
          test -n "$NODE_BIN_PATH"

  node-auto-mise-toml:
    name: node auto via mise.toml / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - shell: bash
        run: |
          mkdir fixture
          cat > fixture/mise.toml <<'EOF'
          [tools]
          node = "20"
          EOF
      - uses: ./
        with:
          node-version: auto
          working-directory: fixture
      - shell: bash
        run: node --version | grep -q '^v20\.'

  node-auto-nvmrc:
    name: node auto via .nvmrc / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - shell: bash
        run: |
          mkdir fixture
          echo "22" > fixture/.nvmrc
      - uses: ./
        with:
          node-version: auto
          working-directory: fixture
      - shell: bash
        run: node --version | grep -q '^v22\.'

  node-auto-missing-errors:
    name: node auto fails when nothing is pinned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - shell: bash
        run: mkdir empty
      - id: setup
        continue-on-error: true
        uses: ./
        with:
          node-version: auto
          working-directory: empty
      - shell: bash
        env:
          SETUP_OUTCOME: ${{ steps.setup.outcome }}
        run: |
          if [ "$SETUP_OUTCOME" != "failure" ]; then
            echo "expected the action to fail when no node version is pinned"
            exit 1
          fi

  run-install:
    name: run-install / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - shell: bash
        run: |
          mkdir project
          cat > project/package.json <<'EOF'
          {
            "name": "aube-action-test",
            "version": "0.0.0",
            "private": true,
            "dependencies": {
              "is-odd": "3.0.1"
            }
          }
          EOF
      - uses: ./
        with:
          node-version: "22"
          working-directory: project
          run-install: true
      - shell: bash
        working-directory: project
        run: |
          test -d node_modules
          test -f node_modules/is-odd/package.json
          node -e 'process.exit(require("is-odd")(3) ? 0 : 1)'

  # Single-name gate: aggregates every matrix combination above into one
  # required status check. If any upstream job failed, was cancelled, or
  # was skipped, this step exits non-zero so the PR is blocked. Lets the
  # branch-protection rule depend on one name instead of N.
  final:
    needs:
      - default
      - pinned
      - node-explicit
      - node-auto-mise-toml
      - node-auto-nvmrc
      - node-auto-missing-errors
      - run-install
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()
    steps:
      - name: Gate on upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = False
          for name, data in sorted(needs.items()):
              result = data.get("result", "unknown")
              if result == "success":
                  print(f"::notice::{name}: {result}")
              else:
                  print(f"::error::{name}: {result}")
                  failed = True

          if failed:
              print("One or more upstream jobs did not complete successfully.")
              sys.exit(1)

          print("All CI jobs completed successfully.")
          PY
